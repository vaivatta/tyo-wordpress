name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with: { php-version: '7.4', tools: composer }
      - run: composer install
      - run: vendor/bin/phpcs
      - run: npm install && npx wp-env start && npx wp-env run tests-cli --env-cwd=wp-content/plugins/vaivatta vendor/bin/phpunit
