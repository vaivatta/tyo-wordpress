name: deploy
# Pushing a git tag deploys that revision to WordPress.org SVN (trunk + tags/<tag> +
# .wordpress-org → assets). Needs WPORG_SVN_USERNAME / WPORG_SVN_PASSWORD secrets.
# workflow_dispatch stays as a manual fallback.
on:
  push:
    tags:
      - '*'
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: WordPress.org deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_USERNAME: ${{ secrets.WPORG_SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.WPORG_SVN_PASSWORD }}
          SLUG: vaivatta
